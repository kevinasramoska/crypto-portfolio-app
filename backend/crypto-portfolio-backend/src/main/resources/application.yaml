# backend/src/main/resources/application.yaml
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cryptodb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change_this_in_real_env}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

crypto:
  api:
    base-url: ${CRYPTO_API_BASE_URL:https://api.coingecko.com/api/v3}
